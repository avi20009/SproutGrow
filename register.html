<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Register Page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout & Grow | Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="images/logo.png" alt="Sprout & Grow Logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="events.html">Events</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<main>

<section class="hero">
    <h1>Event Registration</h1>
    <p>Sign up for one of our upcoming gardening events.</p>
</section>

<section class="content">

<form>

<label for="name">Full Name</label>
<input type="text" id="name" name="name">

<label for="email">Email Address</label>
<input type="email" id="email" name="email">

<label for="phone">Phone Number</label>
<input type="text" id="phone" name="phone">

<label for="comments">Comments</label>
<textarea id="comments" rows="5"></textarea>

<h3>Interests</h3>

<input type="checkbox" id="flowers">
<label for="flowers">Flowers</label><br>

<input type="checkbox" id="vegetables">
<label for="vegetables">Vegetables</label><br>

<input type="checkbox" id="herbs">
<label for="herbs">Herbs</label><br><br>

<h3>Experience Level</h3>

<input type="radio" id="beginner" name="experience">
<label for="beginner">Beginner</label><br>

<input type="radio" id="experienced" name="experience">
<label for="experienced">Experienced</label><br><br>

<label for="event">Choose an Event</label>

<select id="event">
    <option>Spring Gardening Workshop</option>
    <option>Organic Gardening Class</option>
    <option>Community Garden Tour</option>
</select>

<br><br>

<input type="submit" value="Register">

</form>

<p><a href="index.html">← Back to Home</a></p>

</section>

</main>

<footer>

    <p>&copy; 2026 Sprout & Grow | Raleigh, NC</p>

    <a href="https://facebook.com" target="_blank">
        <img src="images/facebook.png" alt="Facebook">
    </a>

    <a href="https://x.com" target="_blank">
        <img src="images/x.png" alt="X">
    </a>

</footer>

</body>
</html>
